<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cloud-Native Task Monitor</title>
    <style>
      body { font-family: Arial, sans-serif; background: #f3f4f6; margin: 0; padding: 2rem; }
      .card { background: #fff; border-radius: 10px; max-width: 760px; margin: 0 auto; padding: 1.5rem; box-shadow: 0 6px 20px rgba(0,0,0,.08); }
      h1 { margin-top: 0; color: #111827; }
      p { color: #374151; }
      button { background: #2563eb; color: white; border: 0; padding: .7rem 1rem; border-radius: 6px; cursor: pointer; }
      pre { background: #111827; color: #e5e7eb; padding: 1rem; border-radius: 6px; overflow-x: auto; }
      .hint { font-size: .9rem; color: #6b7280; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Cloud-Native Task Monitor</h1>
      <p>This frontend calls a private backend service inside Kubernetes using service discovery.</p>
      <button id="fetchBtn">Fetch System Tasks</button>
      <p class="hint">Endpoint: <code>/api/tasks</code> (proxied by Nginx to <code>backend-service:5000</code>)</p>
      <pre id="output">Press the button to load backend data.</pre>
    </div>

    <script>
      const button = document.getElementById('fetchBtn');
      const output = document.getElementById('output');

      button.addEventListener('click', async () => {
        output.textContent = 'Loading...';
        try {
          const response = await fetch('/api/tasks');
          if (!response.ok) throw new Error('Request failed: ' + response.status);
          const data = await response.json();
          output.textContent = JSON.stringify(data, null, 2);
        } catch (err) {
          output.textContent = 'Error: ' + err.message;
        }
      });
    </script>
  </body>
</html>
